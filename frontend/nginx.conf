# ============================================================
# Nginx Configuration - FaceMax Frontend (SPA)
# ============================================================
# Redireciona todas as rotas para index.html (React Router)
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para melhor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache de assets estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: todas as rotas vão para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
