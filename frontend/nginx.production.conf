# ============================================================
# Nginx Production Configuration - FaceMax Frontend
# ============================================================
# Reverse proxy para backend + SPA fallback + seguranca
# ============================================================

# Upstream do backend FastAPI
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Seguranca ---
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # --- API Proxy (encaminha para o backend) ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para analises que demoram
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Limitar tamanho de upload (fotos)
        client_max_body_size 15M;
    }

    # --- Health check do backend ---
    location /health {
        proxy_pass http://backend/api/v1/health;
        proxy_set_header Host $host;
    }

    # --- Assets estaticos (cache agressivo) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Bloquear acesso a arquivos ocultos ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
